#!/usr/sbin/nft -f

flush ruleset

table inet filter {
  chain input {
    type filter hook input priority 0; policy drop;

    # Established connections
    ct state established,related accept

    # Loopback
    iif lo accept

    # ICMP (ping) — needed for network diagnostics
    ip protocol icmp accept
    ip6 nexthdr icmpv6 accept

    # SSH — key-only, restricted post-bootstrap by Artemis
    tcp dport 22 accept

    # WireGuard — both IPv4 and IPv6
    udp dport 51820 accept

    # DNS — only from WireGuard tunnel
    ip saddr 10.10.0.0/16 udp dport 53 accept
    ip saddr 10.10.0.0/16 tcp dport 53 accept

    # Prometheus node exporter — restrict to management VPS IP via Artemis
    tcp dport 9100 accept
  }

  chain forward {
    type filter hook forward priority 0; policy drop;

    # Forward traffic from WireGuard tunnel
    iifname "wg0" accept
    oifname "wg0" ct state established,related accept
  }

  chain output {
    type filter hook output priority 0; policy accept;
  }
}

table ip nat {
  chain postrouting {
    type nat hook postrouting priority 100;
    # Masquerade rules added by WireGuard PostUp
  }
}

table ip6 nat {
  chain postrouting {
    type nat hook postrouting priority 100;
    # IPv6 masquerade rules added by WireGuard PostUp
  }
}
