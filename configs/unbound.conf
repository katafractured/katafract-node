server:
  # Listen on all interfaces including WireGuard tunnel
  interface: 0.0.0.0
  interface: ::0
  port: 53

  # Only allow queries from WireGuard tunnel and localhost
  access-control: 10.10.0.0/16 allow
  access-control: fd00:katafract::/32 allow
  access-control: 127.0.0.1/32 allow
  access-control: ::1/128 allow
  access-control: 0.0.0.0/0 refuse
  access-control: ::/0 refuse

  # Privacy hardening
  hide-identity: yes
  hide-version: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  use-caps-for-id: yes

  # Performance
  cache-min-ttl: 3600
  cache-max-ttl: 86400
  prefetch: yes
  num-threads: 4
  so-rcvbuf: 4m

  # Zero logging — audit requirement
  verbosity: 0
  log-queries: no
  log-replies: no
  log-local-actions: no
  log-servfail: no

  # Blocklist — refreshed daily by cron
  include: /etc/unbound/blocklist.conf

forward-zone:
  name: "."
  forward-tls-upstream: yes
  forward-addr: 1.1.1.1@853#cloudflare-dns.com
  forward-addr: 9.9.9.9@853#dns.quad9.net
